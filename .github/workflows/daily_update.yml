name: Daily News Aggregator Update

on:
  push:
    branches:
      - main
  schedule:
    # 每天北京时间早上 6:00 运行 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许手动触发工作流

permissions:
  contents: write
  pages: write      # 添加 Pages 部署所需权限以确保内建工作流成功
  id-token: write   # 提升安全性配置，适配 OIDC 自动部署

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 明确声明部署环境，有助于触发 GitHub Pages 本身的部署流程和展示环境状态
    environment:
      name: github-pages

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      run: python src/scraper.py

    - name: Run Translator (with Gemini API)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python src/translator.py

    - name: Run Renderer
      run: python src/renderer.py

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        
        # 将 keep_files 改为 false，确保彻底清理历史污染的文件，保持纯净状态
        keep_files: false
        
        # 精准排除源码、缓存和不需要的配置文件。避免污染 gh-pages
        exclude_assets: '.github,src,templates,venv,data,requirements.txt,test_env.py,.gitignore,.nojekyll,*.py'
        
        commit_message: "Automated daily HTML update 🚀"
